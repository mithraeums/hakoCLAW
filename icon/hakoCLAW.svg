<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- hakoCLAW app icon — mithraeum-suite aesthetic.
       Void background, gold corner ticks, dashed spring accent, serif kanji 爪,
       3 rust claw scratches. Critical glyphs sit within the macOS safe area
       (~96px margin) so they survive the rounded-corner mask. -->
  <defs>
    <radialGradient id="g1" cx="30%" cy="20%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="70%" cy="80%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="#0a0a09"/>
  <rect width="1024" height="1024" fill="url(#g1)"/>
  <rect width="1024" height="1024" fill="url(#g2)"/>

  <!-- inner frame -->
  <rect x="96" y="96" width="832" height="832" stroke="#2a2722" stroke-width="2" fill="none"/>

  <!-- gold corner ticks -->
  <g stroke="#b89656" stroke-width="4" stroke-linecap="square">
    <line x1="96"  y1="96"  x2="96"  y2="160"/><line x1="96"  y1="96"  x2="160" y2="96"/>
    <line x1="928" y1="96"  x2="928" y2="160"/><line x1="928" y1="96"  x2="864" y2="96"/>
    <line x1="96"  y1="928" x2="96"  y2="864"/><line x1="96"  y1="928" x2="160" y2="928"/>
    <line x1="928" y1="928" x2="928" y2="864"/><line x1="928" y1="928" x2="864" y2="928"/>
  </g>

  <!-- dashed spring accent -->
  <line x1="240" y1="408" x2="784" y2="408" stroke="#2a2722" stroke-width="2" stroke-dasharray="6 10"/>

  <!-- eyebrow -->
  <text x="512" y="260" text-anchor="middle"
        font-family="'Cormorant Garamond','EB Garamond',Georgia,serif"
        font-size="28" fill="#4a463d" letter-spacing="20" font-weight="500">— II — AGENT</text>

  <!-- kanji 爪 (claw) -->
  <text x="512" y="660" text-anchor="middle"
        font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho','Songti SC',serif"
        font-size="380" fill="#e8e2d2" opacity="0.94">爪</text>

  <!-- claw scratches: 3 diagonal rust strokes over the kanji -->
  <g stroke="#8a3a1f" stroke-width="14" stroke-linecap="round" opacity="0.92">
    <line x1="280" y1="700" x2="700" y2="380"/>
    <line x1="340" y1="780" x2="760" y2="460"/>
    <line x1="400" y1="860" x2="820" y2="540"/>
  </g>

  <!-- wordmark -->
  <text x="512" y="800" text-anchor="middle"
        font-family="'Cormorant Garamond','EB Garamond',Georgia,serif"
        font-size="78" fill="#b89656" font-style="italic" letter-spacing="6" font-weight="500">hakoCLAW</text>

  <!-- ordo footer -->
  <text x="512" y="892" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','SF Mono',monospace"
        font-size="18" fill="#4a463d" letter-spacing="10">— ORDO MITHRAEUM · MMXXVI —</text>
</svg>
